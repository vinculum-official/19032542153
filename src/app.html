<!DOCTYPE html>
<html>
<head>
	%sveltekit.head%
<meta charset="UTF-8">
<title>19032542153</title>
</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  #txt {
    font-size: 6vmin;
    text-align: center;
    padding: 0 1rem;
  }
  img {
    max-width: 100%;
    max-height: 100%;
  }
</style>
</head>
<body>
	%sveltekit.body%
<div id="content"></div>

<script>
const params = new URLSearchParams(window.location.search);

const bg = params.get('bg');
const textbg = params.get('textbg');
const text = params.get('text');
const image = params.get('image');

document.body.style.setProperty('background', bg ? '#'+bg.replace('#','') : '#ffffff', 'important');

const content = document.getElementById('content');

if (image) {
  // image=640x480 -> generate an on-the-fly placeholder via SVG data URI
  const [w, h] = image.split('x').map(n => parseInt(n, 10) || 640);
  const width = w || 640;
  const height = h || 480;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
    <rect width="100%" height="100%" fill="#cccccc"/>
    <text x="50%" y="50%" font-size="${Math.min(width, height) / 8}" fill="#666666"
      text-anchor="middle" dominant-baseline="middle" font-family="sans-serif">
      19032542153
    </text>
  </svg>`;
  const img = document.createElement('img');
  img.src = 'data:image/svg+xml;base64,' + btoa(svg);
  content.appendChild(img);
} else if (text) {
  const div = document.createElement('div');
  div.id = 'txt';
  div.textContent = text;
  div.style.color = textbg ? (textbg.startsWith('#') ? textbg : '#' + textbg) : '#000000';
  content.appendChild(div);
}
// no params -> just blank bg, nothing rendered
</script>
</body>
</html>
